<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 3 - Validação de Formulário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Validação de Formulário</h1>
    <form>
      <div class="form-group">
        <label>Nome:</label>
        <input type="text" class="campo" placeholder="Digite seu nome">
      </div>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" class="campo" placeholder="Digite seu email">
      </div>
      <div class="form-group">
        <label>Telefone:</label>
        <input type="tel" class="campo" placeholder="Digite seu telefone">
      </div>
      <div class="form-group">
        <label>Mensagem:</label>
        <textarea class="campo" placeholder="Digite sua mensagem"></textarea>
      </div>
      <button type="button" id="validar">Validar</button>
    </form>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
