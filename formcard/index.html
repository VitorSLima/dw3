<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Crachá</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Gerador de Crachá</h1>

    <!-- Formulário -->
    <form id="formulario" novalidate>

      <!-- Campo: Nome -->
      <div class="campo">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome" />
        <span class="erro" id="erro-nome"></span>
      </div>

      <!-- Campo: Profissão -->
      <div class="campo">
        <label for="profissao">Profissão</label>
        <input type="text" id="profissao" placeholder="Digite sua profissão" />
        <span class="erro" id="erro-profissao"></span>
      </div>

      <!-- Campo: Data de Nascimento -->
      <div class="campo">
        <label for="data">Data de Nascimento</label>
        <input type="date" id="data" />
        <span class="erro" id="erro-data"></span>
      </div>

      <!-- Campo: Email -->
      <div class="campo">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite seu email" />
        <span class="erro" id="erro-email"></span>
      </div>

      <!-- Campo: Foto -->
      <div class="campo">
        <label for="foto">Foto</label>
        <input type="file" id="foto" accept="image/*" />
        <span class="erro" id="erro-foto"></span>
      </div>

      <!-- Botão para gerar o crachá -->
      <button type="button" id="btn-gerar">Gerar</button>

    </form>

    <!-- Área onde o crachá será exibido -->
    <div id="area-cracha"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
